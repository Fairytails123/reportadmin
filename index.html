<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Report V7 - Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .sidebar { width: 250px; min-height: 100vh; }
    .main-content { margin-left: 250px; min-height: 100vh; }
    .toast { animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .spinner { border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Sidebar -->
  <aside class="sidebar fixed top-0 left-0 bg-slate-800 text-white flex flex-col z-30">
    <div class="p-5 border-b border-slate-700">
      <h1 class="text-lg font-bold tracking-tight">Dog Report V7</h1>
      <p class="text-xs text-slate-400 mt-1">Marker Admin Panel</p>
    </div>
    <nav class="flex-1 py-3" id="sidebar-nav">
      <button onclick="showView('dashboard')" data-nav="dashboard"
        class="nav-btn w-full text-left px-5 py-2.5 text-sm hover:bg-slate-700 transition flex items-center gap-2">
        <span>&#9632;</span> Dashboard
      </button>
      <div class="px-5 pt-4 pb-1 text-xs text-slate-500 uppercase tracking-wider">Markers</div>
      <button onclick="showView('marker',1)" data-nav="marker-1"
        class="nav-btn w-full text-left px-5 py-2.5 text-sm hover:bg-slate-700 transition flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span> Marker 1
      </button>
      <button onclick="showView('marker',2)" data-nav="marker-2"
        class="nav-btn w-full text-left px-5 py-2.5 text-sm hover:bg-slate-700 transition flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-blue-400 inline-block"></span> Marker 2
      </button>
      <button onclick="showView('marker',3)" data-nav="marker-3"
        class="nav-btn w-full text-left px-5 py-2.5 text-sm hover:bg-slate-700 transition flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-yellow-400 inline-block"></span> Marker 3
      </button>
      <button onclick="showView('marker',4)" data-nav="marker-4"
        class="nav-btn w-full text-left px-5 py-2.5 text-sm hover:bg-slate-700 transition flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-orange-400 inline-block"></span> Marker 4
      </button>
      <button onclick="showView('marker',5)" data-nav="marker-5"
        class="nav-btn w-full text-left px-5 py-2.5 text-sm hover:bg-slate-700 transition flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-red-400 inline-block"></span> Marker 5
      </button>
      <div class="px-5 pt-4 pb-1 text-xs text-slate-500 uppercase tracking-wider">Reference</div>
      <button onclick="showView('fields')" data-nav="fields"
        class="nav-btn w-full text-left px-5 py-2.5 text-sm hover:bg-slate-700 transition flex items-center gap-2">
        <span>&#9776;</span> Field Reference
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content p-8">
    <!-- Loading Spinner -->
    <div id="loading" class="flex items-center justify-center h-64">
      <div class="spinner"></div>
    </div>

    <!-- Dashboard View -->
    <div id="view-dashboard" class="hidden">
      <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
      <div id="dashboard-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </div>

    <!-- Marker Editor View -->
    <div id="view-marker" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold" id="editor-title">Marker Editor</h2>
        <button onclick="saveMarker()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
          Save Changes
        </button>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Marker Name</label>
            <input id="editor-name" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Marker Number</label>
            <input id="editor-number" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50" readonly />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Description</label>
          <textarea id="editor-description" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
        </div>
      </div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-lg font-semibold">Field Mappings</h3>
        <button onclick="addMappingRow()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition">
          + Add Mapping
        </button>
      </div>
      <div id="mappings-container" class="space-y-3"></div>
    </div>

    <!-- Field Reference View -->
    <div id="view-fields" class="hidden">
      <h2 class="text-2xl font-bold mb-4">JotForm Field Reference</h2>
      <div class="mb-4">
        <input id="field-search" type="text" placeholder="Search fields..." oninput="renderFieldTable()"
          class="w-full md:w-80 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
      </div>
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left">
            <tr>
              <th class="px-4 py-3 font-medium cursor-pointer hover:bg-gray-100" onclick="sortFields('field_id')">ID</th>
              <th class="px-4 py-3 font-medium cursor-pointer hover:bg-gray-100" onclick="sortFields('field_name')">Name</th>
              <th class="px-4 py-3 font-medium cursor-pointer hover:bg-gray-100" onclick="sortFields('label')">Label</th>
              <th class="px-4 py-3 font-medium cursor-pointer hover:bg-gray-100" onclick="sortFields('type')">Type</th>
              <th class="px-4 py-3 font-medium">Options</th>
            </tr>
          </thead>
          <tbody id="field-table-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

<script>
// =============================================================================
// CONFIG
// =============================================================================
const API_BASE = 'https://ftmanager.app.n8n.cloud/webhook';
const ENDPOINTS = {
  getMarkers: API_BASE + '/v7-markers',
  updateMarker: API_BASE + '/v7-markers-update',
  getFields: API_BASE + '/v7-jotform-fields',
};

const MARKER_COLORS = {
  1: { bg: 'bg-green-50', border: 'border-green-400', text: 'text-green-700', dot: 'bg-green-400' },
  2: { bg: 'bg-blue-50', border: 'border-blue-400', text: 'text-blue-700', dot: 'bg-blue-400' },
  3: { bg: 'bg-yellow-50', border: 'border-yellow-400', text: 'text-yellow-700', dot: 'bg-yellow-400' },
  4: { bg: 'bg-orange-50', border: 'border-orange-400', text: 'text-orange-700', dot: 'bg-orange-400' },
  5: { bg: 'bg-red-50', border: 'border-red-400', text: 'text-red-700', dot: 'bg-red-400' },
};

// =============================================================================
// STATE
// =============================================================================
let markers = [];
let jotformFields = [];
let currentMarkerNumber = null;
let fieldSortKey = 'field_id';
let fieldSortAsc = true;

// =============================================================================
// FIELD TYPE NORMALIZATION
// =============================================================================
function stripControlPrefix(type) {
  if (!type) return '';
  return type.replace(/^control_/, '');
}

function getFieldType(rawType) {
  const stripped = stripControlPrefix(rawType);
  const map = {
    checkbox: 'checkbox',
    radio: 'radio',
    dropdown: 'dropdown',
    rating: 'rating',
    spinner: 'number',
    textbox: 'text',
    textarea: 'text',
  };
  return map[stripped] || stripped;
}

// =============================================================================
// NORMALIZE MARKER DATA (handles both GET and POST key formats)
// =============================================================================
function normalizeMarker(m) {
  return {
    number: m.number ?? m.marker_number,
    name: m.name ?? m.marker_name ?? '',
    description: m.description ?? m.marker_description ?? '',
    mappings: Array.isArray(m.mappings) ? m.mappings : [],
  };
}

// =============================================================================
// API CALLS
// =============================================================================
async function fetchMarkers() {
  try {
    const res = await fetch(ENDPOINTS.getMarkers);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const raw = data.markers || data || [];
    markers = (Array.isArray(raw) ? raw : []).map(normalizeMarker);
  } catch (e) {
    console.error('Failed to fetch markers:', e);
    toast('Failed to load markers', 'error');
    markers = [];
  }
}

async function fetchFields() {
  try {
    const res = await fetch(ENDPOINTS.getFields);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    jotformFields = Array.isArray(data) ? data : (data.fields || data.data || []);
  } catch (e) {
    console.error('Failed to fetch fields:', e);
    toast('Failed to load fields', 'error');
    jotformFields = [];
  }
}

async function saveMarker() {
  const m = markers.find(mk => mk.number === currentMarkerNumber);
  if (!m) return toast('No marker selected', 'error');

  m.name = document.getElementById('editor-name').value.trim();
  m.description = document.getElementById('editor-description').value.trim();

  // Collect mappings from DOM
  const rows = document.querySelectorAll('#mappings-container .mapping-row');
  const mappings = [];
  rows.forEach(row => {
    const fieldSelect = row.querySelector('.field-select');
    const fieldId = fieldSelect ? fieldSelect.value : '';
    if (!fieldId) return;

    const field = jotformFields.find(f => String(f.field_id) === String(fieldId));
    if (!field) return;

    const normalizedType = getFieldType(field.type);
    const value = collectMappingValue(row, field);
    if (value === null || value === '' || (Array.isArray(value) && value.length === 0)) return;

    const values = Array.isArray(value) ? value : [value];
    values.forEach(v => {
      mappings.push({
        field_id: String(field.field_id),
        field_name: field.field_name,
        field_label: field.label,
        field_type: normalizedType,
        field_value: String(v),
      });
    });
  });

  m.mappings = mappings;

  // POST uses marker_ prefixed keys
  const payload = {
    marker_number: m.number,
    marker_name: m.name,
    marker_description: m.description,
    mappings: m.mappings,
  };

  try {
    const res = await fetch(ENDPOINTS.updateMarker, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('Marker ' + m.number + ' saved!', 'success');
    renderDashboard();
  } catch (e) {
    console.error('Save failed:', e);
    toast('Failed to save marker', 'error');
  }
}

function collectMappingValue(row, field) {
  const normalizedType = getFieldType(field.type);
  const valueArea = row.querySelector('.value-area');
  if (!valueArea) return '';

  if (normalizedType === 'checkbox') {
    const checked = valueArea.querySelectorAll('input[type="checkbox"]:checked');
    return Array.from(checked).map(cb => cb.value);
  }
  if (normalizedType === 'radio' || normalizedType === 'dropdown') {
    const sel = valueArea.querySelector('select');
    return sel ? sel.value : '';
  }
  if (normalizedType === 'rating' || normalizedType === 'number') {
    const inp = valueArea.querySelector('input[type="number"]');
    return inp ? inp.value : '';
  }
  // text fallback
  const inp = valueArea.querySelector('input[type="text"], textarea');
  return inp ? inp.value : '';
}

// =============================================================================
// TOAST NOTIFICATIONS
// =============================================================================
function toast(msg, type) {
  type = type || 'info';
  const container = document.getElementById('toast-container');
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
  const el = document.createElement('div');
  el.className = 'toast ' + (colors[type] || colors.info) + ' text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// =============================================================================
// VIEW MANAGEMENT
// =============================================================================
function showView(view, markerNum) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('view-dashboard').classList.add('hidden');
  document.getElementById('view-marker').classList.add('hidden');
  document.getElementById('view-fields').classList.add('hidden');

  // Update sidebar active state
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('bg-slate-700'); });

  if (view === 'dashboard') {
    document.getElementById('view-dashboard').classList.remove('hidden');
    var dashBtn = document.querySelector('[data-nav="dashboard"]');
    if (dashBtn) dashBtn.classList.add('bg-slate-700');
    renderDashboard();
  } else if (view === 'marker') {
    document.getElementById('view-marker').classList.remove('hidden');
    var mBtn = document.querySelector('[data-nav="marker-' + markerNum + '"]');
    if (mBtn) mBtn.classList.add('bg-slate-700');
    openMarkerEditor(markerNum);
  } else if (view === 'fields') {
    document.getElementById('view-fields').classList.remove('hidden');
    var fBtn = document.querySelector('[data-nav="fields"]');
    if (fBtn) fBtn.classList.add('bg-slate-700');
    renderFieldTable();
  }
}

// =============================================================================
// DASHBOARD
// =============================================================================
function renderDashboard() {
  var container = document.getElementById('dashboard-cards');
  container.innerHTML = '';

  for (var i = 1; i <= 5; i++) {
    var m = markers.find(function(mk) { return mk.number === i; });
    var c = MARKER_COLORS[i];
    var name = m ? m.name : 'Marker ' + i;
    var desc = m ? m.description : 'Not configured';
    var count = m ? m.mappings.length : 0;

    var card = document.createElement('div');
    card.className = c.bg + ' border-l-4 ' + c.border + ' rounded-xl p-5 cursor-pointer hover:shadow-md transition';
    card.setAttribute('data-marker', i);
    card.onclick = (function(num) { return function() { showView('marker', num); }; })(i);
    card.innerHTML =
      '<div class="flex items-center gap-2 mb-2">' +
        '<span class="w-3 h-3 rounded-full ' + c.dot + '"></span>' +
        '<span class="font-semibold ' + c.text + '">Marker ' + i + '</span>' +
      '</div>' +
      '<h3 class="text-lg font-bold mb-1">' + esc(name) + '</h3>' +
      '<p class="text-sm text-gray-600 mb-3">' + esc(desc) + '</p>' +
      '<div class="text-xs text-gray-500">' + count + ' field mapping' + (count !== 1 ? 's' : '') + '</div>';
    container.appendChild(card);
  }
}

// =============================================================================
// MARKER EDITOR
// =============================================================================
function openMarkerEditor(num) {
  currentMarkerNumber = num;
  var m = markers.find(function(mk) { return mk.number === num; });

  document.getElementById('editor-title').textContent = 'Marker ' + num + ' Editor';
  document.getElementById('editor-number').value = num;
  document.getElementById('editor-name').value = m ? m.name : '';
  document.getElementById('editor-description').value = m ? m.description : '';

  renderMappings(m ? m.mappings : []);
}

function renderMappings(mappings) {
  var container = document.getElementById('mappings-container');
  container.innerHTML = '';

  // Group mappings by field_id so multiple checkbox values for the same field collapse into one row
  var grouped = {};
  mappings.forEach(function(mp) {
    var key = String(mp.field_id);
    if (!grouped[key]) {
      grouped[key] = { field_id: mp.field_id, field_name: mp.field_name, field_label: mp.field_label, field_type: mp.field_type, values: [mp.field_value] };
    } else {
      grouped[key].values.push(mp.field_value);
    }
  });

  var keys = Object.keys(grouped);
  if (keys.length === 0) {
    container.innerHTML = '<p class="text-sm text-gray-400 py-4 text-center">No mappings yet. Click "+ Add Mapping" to start.</p>';
    return;
  }

  keys.forEach(function(k) {
    addMappingRow(grouped[k]);
  });
}

function addMappingRow(existingMapping) {
  var container = document.getElementById('mappings-container');
  // Remove the empty placeholder if present
  var placeholder = container.querySelector('p');
  if (placeholder) placeholder.remove();

  var row = document.createElement('div');
  row.className = 'mapping-row bg-white rounded-xl shadow-sm p-4 flex flex-col gap-3';

  var topRow = document.createElement('div');
  topRow.className = 'flex items-center gap-3';

  // Field selector
  var fieldSelect = document.createElement('select');
  fieldSelect.className = 'field-select flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none';
  fieldSelect.innerHTML = '<option value="">-- Select JotForm Field --</option>';

  jotformFields.forEach(function(f) {
    var opt = document.createElement('option');
    opt.value = f.field_id;
    opt.textContent = f.label + ' (' + getFieldType(f.type) + ')';
    // Match by field_id, comparing as strings
    if (existingMapping && String(existingMapping.field_id) === String(f.field_id)) {
      opt.selected = true;
    }
    fieldSelect.appendChild(opt);
  });

  // Value area
  var valueArea = document.createElement('div');
  valueArea.className = 'value-area flex-1';

  // Remove button
  var removeBtn = document.createElement('button');
  removeBtn.className = 'text-red-500 hover:text-red-700 text-lg font-bold px-2 transition';
  removeBtn.innerHTML = '&times;';
  removeBtn.onclick = function() { row.remove(); };

  topRow.appendChild(fieldSelect);
  topRow.appendChild(removeBtn);
  row.appendChild(topRow);
  row.appendChild(valueArea);
  container.appendChild(row);

  fieldSelect.addEventListener('change', function() {
    renderValueInput(valueArea, fieldSelect.value, null);
  });

  // If existing mapping, render value input with pre-selected values
  if (existingMapping && existingMapping.field_id) {
    var values = existingMapping.values || [existingMapping.field_value];
    renderValueInput(valueArea, existingMapping.field_id, values);
  }
}

function renderValueInput(valueArea, fieldId, existingValues) {
  valueArea.innerHTML = '';
  if (!fieldId) return;

  var field = jotformFields.find(function(f) { return String(f.field_id) === String(fieldId); });
  if (!field) return;

  var normalizedType = getFieldType(field.type);
  var options = field.options || [];
  var existing = existingValues || [];

  if (normalizedType === 'checkbox' && options.length > 0) {
    // Show EXACT JotForm options as individual checkboxes
    var grid = document.createElement('div');
    grid.className = 'grid grid-cols-2 md:grid-cols-3 gap-2 mt-1';
    options.forEach(function(optText) {
      var label = document.createElement('label');
      label.className = 'flex items-center gap-2 text-sm cursor-pointer p-1.5 rounded hover:bg-gray-50';
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = optText;
      cb.className = 'rounded border-gray-300';
      if (existing.indexOf(optText) !== -1) cb.checked = true;
      label.appendChild(cb);
      label.appendChild(document.createTextNode(optText));
      grid.appendChild(label);
    });
    valueArea.appendChild(grid);

  } else if ((normalizedType === 'radio' || normalizedType === 'dropdown') && options.length > 0) {
    // Show EXACT JotForm options as a select dropdown
    var sel = document.createElement('select');
    sel.className = 'w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mt-1';
    sel.innerHTML = '<option value="">-- Select Value --</option>';
    options.forEach(function(optText) {
      var o = document.createElement('option');
      o.value = optText;
      o.textContent = optText;
      if (existing.indexOf(optText) !== -1) o.selected = true;
      sel.appendChild(o);
    });
    valueArea.appendChild(sel);

  } else if (normalizedType === 'rating') {
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.min = '1';
    inp.max = '5';
    inp.step = '1';
    inp.value = existing[0] || '';
    inp.placeholder = '1-5';
    inp.className = 'w-32 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mt-1';
    valueArea.appendChild(inp);

  } else if (normalizedType === 'number') {
    var inp2 = document.createElement('input');
    inp2.type = 'number';
    inp2.value = existing[0] || '';
    inp2.placeholder = 'Enter number';
    inp2.className = 'w-32 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mt-1';
    valueArea.appendChild(inp2);

  } else {
    // text / textarea / unknown - free text input
    var inp3 = document.createElement('input');
    inp3.type = 'text';
    inp3.value = existing[0] || '';
    inp3.placeholder = 'Enter value';
    inp3.className = 'w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mt-1';
    valueArea.appendChild(inp3);
  }
}

// =============================================================================
// FIELD REFERENCE TABLE
// =============================================================================
function sortFields(key) {
  if (fieldSortKey === key) {
    fieldSortAsc = !fieldSortAsc;
  } else {
    fieldSortKey = key;
    fieldSortAsc = true;
  }
  renderFieldTable();
}

function renderFieldTable() {
  var search = (document.getElementById('field-search').value || '').toLowerCase();
  var tbody = document.getElementById('field-table-body');
  tbody.innerHTML = '';

  var filtered = jotformFields.filter(function(f) {
    if (!search) return true;
    return (
      String(f.field_id).includes(search) ||
      (f.field_name || '').toLowerCase().includes(search) ||
      (f.label || '').toLowerCase().includes(search) ||
      (f.type || '').toLowerCase().includes(search)
    );
  });

  filtered.sort(function(a, b) {
    var va = a[fieldSortKey] || '';
    var vb = b[fieldSortKey] || '';
    if (fieldSortKey === 'field_id') {
      va = Number(va);
      vb = Number(vb);
    } else {
      va = String(va).toLowerCase();
      vb = String(vb).toLowerCase();
    }
    if (va < vb) return fieldSortAsc ? -1 : 1;
    if (va > vb) return fieldSortAsc ? 1 : -1;
    return 0;
  });

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">No fields found</td></tr>';
    return;
  }

  filtered.forEach(function(f) {
    var tr = document.createElement('tr');
    tr.className = 'border-t border-gray-100 hover:bg-gray-50';
    var opts = (f.options || []).join(', ');
    tr.innerHTML =
      '<td class="px-4 py-2.5 font-mono text-xs">' + esc(String(f.field_id)) + '</td>' +
      '<td class="px-4 py-2.5 text-sm">' + esc(f.field_name || '') + '</td>' +
      '<td class="px-4 py-2.5 text-sm font-medium">' + esc(f.label || '') + '</td>' +
      '<td class="px-4 py-2.5"><span class="inline-block bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded">' + esc(getFieldType(f.type)) + '</span></td>' +
      '<td class="px-4 py-2.5 text-xs text-gray-500 max-w-xs truncate">' + (opts ? esc(opts) : '<span class="text-gray-300">-</span>') + '</td>';
    tbody.appendChild(tr);
  });
}

// =============================================================================
// HELPERS
// =============================================================================
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// =============================================================================
// INIT
// =============================================================================
(async function init() {
  await Promise.all([fetchMarkers(), fetchFields()]);
  showView('dashboard');
})();
</script>
